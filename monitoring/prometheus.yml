global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: bda-api
    static_configs:
      - targets: ["api:8100"]
    metrics_path: /api/v1/admin/metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Redis and PostgreSQL metrics require dedicated exporters
  # (redis_exporter / postgres_exporter). Add them as services and wire the
  # targets below once deployed:
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
