# Reverse proxy for the BDA Workbench edge.
#
# TLS: terminate HTTPS here in production. Mount certs and enable the 443 server
# block below (a self-signed pair works for staging). The HTTP block then becomes
# a redirect to HTTPS. Certificates are intentionally not committed to the repo.
#
# server {
#     listen 443 ssl http2;
#     server_name bda.local;
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#     # ... same location blocks as below ...
# }

server {
    listen 80;
    server_name bda.local localhost;

    # Baseline security headers applied to every response.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "0" always;

    # Don't leak the nginx version.
    server_tokens off;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Request timeouts so a slow/stuck upstream cannot pin connections.
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        client_max_body_size 25m;
    }
}
