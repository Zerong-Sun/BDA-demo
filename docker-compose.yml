services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-bda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost only; not published to the public interface.
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bda}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    stop_grace_period: 15s
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    restart: unless-stopped
    stop_grace_period: 30s
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BDA_MINIO_ACCESS_KEY:?BDA_MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${BDA_MINIO_SECRET_KEY:?BDA_MINIO_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: .env
    environment:
      BDA_DB_PATH: ${BDA_DB_PATH:-backend/db/bda.sqlite3}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      BDA_MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend/db:/app/backend/db
      - ./artifacts:/app/artifacts
    expose:
      - "8100"
    ports:
      - "127.0.0.1:8100:8100"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/api/v1/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # init_db uses --if-missing so repeated restarts never clobber existing data.
    command: >
      sh -c "python backend/scripts/init_db.py --if-missing &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8100 --timeout-keep-alive 30"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    stop_grace_period: 60s
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - ./backend/db:/app/backend/db
      - ./artifacts:/app/artifacts
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: celery -A backend.app.celery_app.celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.app.celery_app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api/v1
    restart: unless-stopped
    stop_grace_period: 15s
    expose:
      - "80"
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - frontend
      - backend
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    stop_grace_period: 15s
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - backend
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  # Public-facing edge (nginx + SPA). Internal services are isolated on `backend`.
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  pgdata:
  minio_data:
  prometheus_data:
  grafana_data:
