services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bda}
      POSTGRES_DB: ${POSTGRES_DB:-bda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bda"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BDA_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${BDA_MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      BDA_DB_PATH: ${BDA_DB_PATH:-backend/db/bda.sqlite3}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      BDA_MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend/db:/app/backend/db
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8100:8100"
    depends_on:
      - redis
      - minio
    command: >
      sh -c "python backend/scripts/init_db.py &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8100"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend/db:/app/backend/db
      - ./artifacts:/app/artifacts
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - api
    command: celery -A backend.app.celery_app.celery_app worker --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api/v1
    ports:
      - "5173:80"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - frontend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  minio_data:
