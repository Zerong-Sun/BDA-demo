name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token; jobs opt into more only if needed.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Init database
        run: python backend/scripts/init_db.py
        env:
          PYTHONPATH: .
      - name: Run tests
        run: python -m pytest backend/tests/ -q
        env:
          PYTHONPATH: .
      - name: Lint
        run: ruff check backend/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Node dependency audit
        working-directory: frontend
        run: npm audit --omit=dev || true
      - name: Filesystem & config vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

  # Deployment is gated on the other jobs. Fill in real credentials/registry
  # via repository secrets and a staging environment before enabling pushes.
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend, security]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Deploy (placeholder)
        run: echo "Wire up image build/push and staging deploy here."
